services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: restaurant_orders
      POSTGRES_USER: restaurant
      POSTGRES_PASSWORD: restaurant
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restaurant -d restaurant_orders"]
      interval: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgres://restaurant:restaurant@db:5432/restaurant_orders?sslmode=disable
      JWT_SECRET: change-me-in-production
      PORT: "8080"
      UPLOAD_DIR: /app/uploads
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - uploads:/uploads:ro
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
